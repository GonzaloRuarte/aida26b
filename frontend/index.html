<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Académica - Faculty of Exact Sciences</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg-2: #111c2f;
            --panel: rgba(14, 21, 35, 0.86);
            --panel-strong: #121b2c;
            --text: #edf3ff;
            --muted: #a7b4cb;
            --border: rgba(168, 189, 223, 0.18);
            --accent: #33b3a6;
            --accent-2: #5f87ff;
            --danger: #d65d71;
            --shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            margin: 0;
            height: 100vh;
            padding: 0;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(95, 135, 255, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(51, 179, 166, 0.14), transparent 28%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            border-radius: 999px;
            pointer-events: none;
            z-index: 0;
            filter: blur(8px);
        }

        body::before {
            top: -40px;
            right: 8%;
            width: 180px;
            height: 180px;
            background: rgba(95, 135, 255, 0.12);
        }

        body::after {
            bottom: 12px;
            left: 6%;
            width: 240px;
            height: 240px;
            background: rgba(51, 179, 166, 0.1);
        }

        .container {
            width: 100%;
            height: 100%;
            min-height: 0;
            margin: 0;
            position: relative;
            z-index: 1;
            background: var(--panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 0;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 20px;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
            text-wrap: balance;
        }

        #app-root {
            display: grid;
            gap: 18px;
            flex: 1;
            height: 100%;
            min-height: 0;
        }

        .workspace-layout {
            display: grid;
            grid-template-columns: minmax(210px, 290px) minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr);
            gap: 16px;
            align-items: stretch;
            height: 100%;
            min-height: 0;
            overflow: hidden;
        }

        .sidebar {
            position: relative;
            align-self: stretch;
            height: 100%;
            max-height: 100%;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .sections-host {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 12px;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            z-index: 2;
            background: rgba(18, 27, 44, 0.88);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(12px);
            min-height: 0;
            flex: 1;
            height: 100%;
            max-height: 100%;
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scrollbar-gutter: stable;
            overscroll-behavior: contain;
        }

        .nav button {
            margin: 0;
            padding: 12px 16px;
            background: transparent;
            color: var(--text);
            text-align: left;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
            font-size: 1rem;
        }

        .nav button:hover {
            background: rgba(95, 135, 255, 0.14);
            border-color: rgba(95, 135, 255, 0.22);
            transform: translateY(-1px);
        }

        .nav button.active {
            background: var(--accent-2);
            color: white;
            border-color: transparent;
        }

        .nav-group {
            flex: 0 0 auto;
            border: 1px solid rgba(168, 189, 223, 0.14);
            border-radius: 12px;
            background: rgba(13, 21, 37, 0.55);
            overflow: hidden;
        }

        .nav-group-title {
            list-style: none;
            cursor: pointer;
            padding: 10px 12px;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            background: rgba(95, 135, 255, 0.08);
            user-select: none;
        }

        .nav-group-title::-webkit-details-marker {
            display: none;
        }

        .nav-group-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }

        .section {
            display: none;
            padding: 14px;
            background: rgba(18, 27, 44, 0.84);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            min-width: 0;
            height: auto;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            flex-direction: column;
        }

        .section.active {
            display: flex;
        }

        .section h2 {
            margin: 0 0 14px;
            font-size: clamp(1.08rem, 1.7vw, 1.3rem);
            letter-spacing: -0.02em;
        }

        .table-wrap {
            overflow: auto;
            max-width: 100%;
            border-radius: 16px;
            flex: 1;
            min-height: 0;
            scrollbar-gutter: stable both-edges;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(19, 32, 43, 0.08);
            vertical-align: top;
            font-size: 0.93rem;
            white-space: normal;
        }

        th {
            background: linear-gradient(180deg, #1a263d, #141e32);
            color: #c9d4ea;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tbody tr:hover {
            background: rgba(95, 135, 255, 0.08);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        button {
            padding: 5px 11px;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            font-size: 0.88rem;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }


        .edit-btn {
            background-color: var(--accent);
            color: #04161a;
        }

        .delete-btn {
            background-color: var(--danger);
            color: white;
        }

        .add-btn {
            background-color: var(--accent-2);
            color: white;
            margin-bottom: 10px;
            box-shadow: 0 10px 24px rgba(95, 135, 255, 0.22);
        }

        .list-controls {
            display: block;
            margin-bottom: 12px;
        }

        .query-panel {
            background: rgba(11, 16, 32, 0.75);
            border: 1px solid rgba(168, 189, 223, 0.16);
            border-radius: 12px;
            padding: 8px 10px;
        }

        .query-panel > summary {
            cursor: pointer;
            font-weight: 700;
            color: #d8e4ff;
            margin-bottom: 8px;
        }

        .query-block {
            display: grid;
            gap: 6px;
            margin-bottom: 8px;
        }

        .query-block-title {
            font-size: 0.82rem;
            color: #c9d4ea;
            font-weight: 700;
        }

        .query-rows-host {
            display: grid;
            gap: 6px;
        }

        .filter-logic-select {
            max-width: 120px;
            margin-bottom: 4px;
        }

        .query-row {
            display: grid;
            grid-template-columns: minmax(170px, 1.2fr) minmax(170px, 1.1fr) minmax(180px, 1.2fr) 90px auto;
            gap: 6px;
            align-items: center;
        }

        .query-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .list-controls .apply-btn {
            background: var(--accent);
            color: #04161a;
        }

        .list-controls .clear-btn {
            background: rgba(168, 189, 223, 0.18);
            color: var(--text);
            border-color: rgba(168, 189, 223, 0.24);
        }

        .list-state-bar {
            display: grid;
            grid-template-columns: minmax(240px, 1.3fr) minmax(160px, 1fr) minmax(160px, 1fr) auto auto auto auto auto minmax(170px, 1fr) auto;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .state-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .state-chip {
            display: inline-flex;
            align-items: center;
            background: rgba(95, 135, 255, 0.16);
            border: 1px solid rgba(95, 135, 255, 0.35);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.8rem;
            color: #d8e4ff;
        }

        .state-chip.is-muted {
            background: rgba(168, 189, 223, 0.12);
            border-color: rgba(168, 189, 223, 0.24);
            color: #c9d4ea;
        }

        .save-view-btn {
            background: #3fba88;
            color: #0d1c14;
        }

        .delete-view-btn {
            background: rgba(232, 95, 111, 0.22);
            color: #ffd5db;
            border-color: rgba(232, 95, 111, 0.45);
        }

        .list-error {
            grid-column: 1 / -1;
            background: rgba(232, 95, 111, 0.14);
            border: 1px solid rgba(232, 95, 111, 0.35);
            color: #ffd5db;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 0.86rem;
        }

        .page-btn {
            min-width: 42px;
            background: rgba(168, 189, 223, 0.18);
            color: var(--text);
            border-color: rgba(168, 189, 223, 0.24);
        }

        .page-info {
            font-size: 0.84rem;
            color: #c9d4ea;
        }

        .column-picker-toggle {
            background: rgba(95, 135, 255, 0.22);
            color: #d8e4ff;
            border-color: rgba(95, 135, 255, 0.35);
        }

        .column-picker-panel {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 6px;
            background: rgba(11, 16, 32, 0.75);
            border: 1px solid rgba(168, 189, 223, 0.16);
            border-radius: 10px;
            padding: 8px;
        }

        .column-picker-panel label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            font-size: 0.84rem;
            font-weight: 600;
            color: #c9d4ea;
        }

        .studio-entity-select {
            width: 100%;
            margin-bottom: 10px;
        }

        .studio-action-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .studio-add-btn {
            background: var(--accent);
            color: #04161a;
        }

        .studio-reload-btn {
            background: rgba(168, 189, 223, 0.18);
            color: var(--text);
            border-color: rgba(168, 189, 223, 0.24);
        }

        .studio-save-btn {
            background: #3fba88;
            color: #0d1c14;
        }

        .studio-rows-host {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
        }

        .studio-row {
            display: grid;
            grid-template-columns: minmax(120px, 1.2fr) minmax(130px, 1fr) minmax(140px, 1fr) minmax(140px, 1fr) auto auto auto 90px auto;
            gap: 6px;
            align-items: center;
            background: rgba(11, 16, 32, 0.75);
            border: 1px solid rgba(168, 189, 223, 0.16);
            border-radius: 12px;
            padding: 8px;
        }

        .studio-row input,
        .studio-row select {
            margin: 0;
        }

        .studio-flag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            margin: 0;
            font-weight: 600;
        }

        .studio-remove-row {
            background: rgba(232, 95, 111, 0.22);
            color: #ffd5db;
            border-color: rgba(232, 95, 111, 0.45);
        }

        .studio-message {
            background: rgba(63, 186, 136, 0.14);
            border: 1px solid rgba(63, 186, 136, 0.35);
            color: #c9f3dd;
            border-radius: 10px;
            padding: 7px 10px;
            font-size: 0.86rem;
        }

        .studio-message.error {
            background: rgba(232, 95, 111, 0.14);
            border-color: rgba(232, 95, 111, 0.35);
            color: #ffd5db;
        }

        form {
            background: rgba(11, 16, 32, 0.92);
            padding: 14px;
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(168, 189, 223, 0.12);
            overflow: auto;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #c9d4ea;
        }

        input, select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid rgba(168, 189, 223, 0.16);
            border-radius: 12px;
            background: #0d1525;
            color: var(--text);
            font-size: 0.9rem;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            font-weight: 600;
        }

        input[type="checkbox"] {
            width: auto;
            padding: 0;
            border: none;
            accent-color: var(--accent-2);
            transform: scale(1.15);
        }

        textarea {
            width: 100%;
            min-height: 92px;
            padding: 8px 10px;
            border: 1px solid rgba(168, 189, 223, 0.16);
            border-radius: 12px;
            background: #0d1525;
            color: var(--text);
            resize: vertical;
            font-size: 0.9rem;
        }

        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .cancel-btn {
            background-color: #44526f;
            color: white;
        }

        .row-action-btn {
            background: rgba(95, 135, 255, 0.14);
            color: #d5e0ff;
            border-color: rgba(95, 135, 255, 0.2);
        }

        @media (max-width: 980px) {
            .workspace-layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: auto;
            }

            .sidebar {
                position: static;
                height: auto;
                max-height: none;
                overflow: visible;
            }

            .nav {
                flex-direction: column;
                flex-wrap: nowrap;
                overflow-y: scroll;
                overflow-x: hidden;
                height: auto;
                max-height: none;
                min-height: 0;
            }

            .section {
                height: auto;
                min-height: 320px;
            }

            .list-controls {
                display: block;
            }

            .query-row {
                grid-template-columns: 1fr;
            }

            .list-state-bar {
                grid-template-columns: 1fr;
            }

            .studio-row {
                grid-template-columns: 1fr;
            }

            .nav button {
                text-align: left;
                flex: 0 0 auto;
                min-width: 0;
            }
        }

        @media (max-width: 800px) {
            body {
                padding: 16px 10px 28px;
            }

            .container {
                padding: 18px;
                border-radius: 22px;
            }

            .nav {
                padding: 10px;
            }

            .section {
                padding: 14px;
            }

            th, td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión Académica / Academic Management System</h1>
        <div id="app-root"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
