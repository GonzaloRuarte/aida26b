services:
  db:
    image: postgres:16-alpine
    container_name: aida26b-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      AIDA26_OWNER_USER: ${AIDA26_OWNER_USER:-aida26_owner}
      AIDA26_APP_USER: ${AIDA26_APP_USER:-aida26_user}
      AIDA26_APP_PASSWORD: ${AIDA26_APP_PASSWORD:-app_local_password}
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init/01-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./database/schema.sql:/docker-entrypoint-initdb.d/_schema/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aida26b-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${APP_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: faculty_management
      DB_USER: ${AIDA26_APP_USER:-aida26_user}
      DB_PASSWORD: ${AIDA26_APP_PASSWORD:-app_local_password}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  db_data:
