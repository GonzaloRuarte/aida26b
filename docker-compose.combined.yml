version: '3.8'

services:
  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    container_name: aida26_database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - aida26_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Combined Backend + Frontend Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: aida26_app
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: faculty_management
      DB_USER: aida26_user
      DB_PASSWORD: CambiaEsta!
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aida26_network
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/package.json:/app/backend/package.json
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./frontend/src:/app/frontend/src
      - ./frontend/package.json:/app/frontend/package.json
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/index.html:/app/frontend/index.html

volumes:
  postgres_data:

networks:
  aida26_network:
    driver: bridge
